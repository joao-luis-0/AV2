<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <!-- Wing shape -->
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00aacc"/>
      <stop offset="100%" style="stop-color:#005577"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077aa"/>
      <stop offset="100%" style="stop-color:#003355"/>
    </linearGradient>
  </defs>
  <!-- Left wing -->
  <path d="M10,40 Q30,10 60,25 Q40,35 35,45 Q22,42 10,40Z" fill="url(#wg)" opacity="0.9"/>
  <!-- Right wing -->
  <path d="M110,40 Q90,10 60,25 Q80,35 85,45 Q98,42 110,40Z" fill="url(#wg2)" opacity="0.9"/>
  <!-- Body/fuselage -->
  <ellipse cx="60" cy="35" rx="8" ry="18" fill="url(#wg)" transform="rotate(-5,60,35)"/>
  <!-- Circuit dots -->
  <circle cx="45" cy="30" r="2" fill="#00ccff" opacity="0.7"/>
  <circle cx="55" cy="22" r="1.5" fill="#00ccff" opacity="0.6"/>
  <circle cx="75" cy="30" r="2" fill="#00ccff" opacity="0.7"/>
  <!-- Lines -->
  <line x1="45" y1="30" x2="55" y2="22" stroke="#00ccff" stroke-width="0.8" opacity="0.5"/>
  <line x1="55" y1="22" x2="75" y2="30" stroke="#00ccff" stroke-width="0.8" opacity="0.5"/>
</svg>
