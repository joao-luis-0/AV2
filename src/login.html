<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroCode – Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-logo">
      <img src="" alt="AeroCode Logo">
      <div class="brand">AERO<span style="color:var(--accent2)">CODE</span></div>
      <div class="sub">AVIAÇÃO E TECNOLOGIA AVANÇADA</div>
    </div>

    <div class="login-card">
      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" id="email" placeholder="">
      </div>
      <div class="form-group">
        <label>SENHA</label>
        <input type="password" id="senha" placeholder="">
      </div>
      <button class="btn-login" onclick="handleLogin()">ENTRAR</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/js/shared.js"></script>
  <script>
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      if (!email || !senha) {
        showToast('Preencha email e senha.');
        return;
      }
      // Simple auth simulation
      window.location.href = '/dashboard';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
