<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroCode – Cadastro de Testes</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="" alt="AeroCode">
        <div class="brand-name">AERO<span style="color:var(--accent2)">CODE</span></div>
        <div class="brand-sub">AVIAÇÃO E TECNOLOGIA AVANÇADA</div>
      </div>
      <a href="/dashboard" class="nav-btn">AERONAVE</a>
      <a href="/pecas" class="nav-btn">PEÇAS</a>
      <a href="/etapas" class="nav-btn">ETAPA</a>
      <a href="/testes" class="nav-btn active">TESTES</a>
      <div class="sidebar-user">
        <div class="dot"></div>
        USUÁRIO_X
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <div class="page-header">
        <h1>CADASTRO DE TESTE</h1>
        <p>Cadastre e gerencie os testes da produção</p>
      </div>
      <div class="page-body">
        <div class="form-card">
          <h2>CADASTRO DE TESTES</h2>

          <div class="form-group">
            <label>NOME DO TESTE</label>
            <input type="text" id="nomeTeste" placeholder="">
          </div>

          <div class="form-group">
            <label>ESCOLHA O TIPO DO TESTE</label>
            <div class="select-wrapper">
              <select id="tipo">
                <option value="">Selecione...</option>
                <option value="ELÉTRICO">ELÉTRICO</option>
                <option value="HIDRÁULICO">HIDRÁULICO</option>
                <option value="ESTRUTURAL">ESTRUTURAL</option>
                <option value="FUNCIONAL">FUNCIONAL</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>STATUS DO TESTE</label>
            <div class="select-wrapper">
              <select id="status">
                <option value="EM ANDAMENTO">EM ANDAMENTO</option>
                <option value="CONCLUÍDA">CONCLUÍDA</option>
              </select>
            </div>
          </div>

          <button class="btn-primary" onclick="cadastrarTeste()">CADASTRAR</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/js/shared.js"></script>
  <script>
    async function cadastrarTeste() {
      const nome = document.getElementById('nomeTeste').value.trim();
      const tipo = document.getElementById('tipo').value;
      const status = document.getElementById('status').value;

      if (!nome || !tipo) {
        showToast('Preencha todos os campos obrigatórios.');
        return;
      }

      const res = await fetch('/api/testes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, tipo, status })
      });

      if (res.ok) {
        showToast('Teste cadastrado com sucesso!');
        document.getElementById('nomeTeste').value = '';
        document.getElementById('tipo').value = '';
      } else {
        showToast('Erro ao cadastrar teste.');
      }
    }
  </script>
</body>
</html>
